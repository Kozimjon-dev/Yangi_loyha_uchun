<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vagon Nazorat - Admin Tizimi</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #1e293b; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 450px; background: var(--card-bg); padding: 30px; border-radius: 16px; margin: 30px auto; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        h2 { text-align: center; color: var(--primary); margin-top: 0; font-size: 24px; }
        label { font-size: 14px; font-weight: 600; color: #64748b; margin-bottom: 4px; display: block; }
        input, textarea, button { width: 100%; padding: 12px; margin: 8px 0 16px 0; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; padding: 14px; font-size: 16px; }
        button:hover { background: #1d4ed8; }
        .link { text-align: center; font-size: 14px; color: var(--primary); cursor: pointer; display: block; margin-top: 5px; font-weight: 600; }
        .hidden { display: none; }
        .record-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--primary); border-radius: 8px; }
        .user-info { background: #e0f2fe; color: #0369a1; padding: 10px 15px; border-radius: 10px; font-size: 14px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-btn { background: #ef4444; width: auto; padding: 8px 12px; font-size: 12px; margin: 0; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container" id="reg-box">
    <h2>Yangi Profil Yaratish</h2>
    <label>F.I.O:</label>
    <input type="text" id="reg-fio" placeholder="Ism va familiyangiz">
    <label>Login:</label>
    <input type="text" id="reg-login" placeholder="Masalan: abdulloh123">
    <label>Parol:</label>
    <input type="password" id="reg-pass" placeholder="Parol yarating">
    <button onclick="signUp()">Ro'yxatdan o'tish</button>
    <span class="link" onclick="toggleAuth()">Akkountingiz bormi? Kirish</span>
</div>

<div class="container hidden" id="login-box">
    <h2>Tizimga Kirish</h2>
    <label>Login:</label>
    <input type="text" id="login-user" placeholder="Loginingizni yozing">
    <label>Parol:</label>
    <input type="password" id="login-pass" placeholder="Parolingizni yozing">
    <button onclick="signIn()">Kirish</button>
    <span class="link" onclick="toggleAuth()">Yangi profil yaratish</span>
</div>

<div class="container hidden" id="main-app">
    <div class="user-info">
        <span id="user-header"></span>
        <button class="logout-btn" onclick="logout()">Chiqish</button>
    </div>
    <h2>Vagon Nosozlik Kiritish</h2>
    <label>Vagon raqami:</label>
    <input type="text" id="vagon-num" placeholder="Masalan: 1234...">
    <label>Nosozlik tavsifi:</label>
    <textarea id="issue-desc" placeholder="Nosozlikni batafsil yozing..." rows="4"></textarea>
    <button onclick="submitReport()">Hisobotni yuborish</button>

    <div id="admin-section" class="hidden">
        <hr style="border: 0; height: 1px; background: #e2e8f0; margin: 20px 0;">
        <h3>📋 Barcha Nosozliklar</h3>
        <div id="reports-list"></div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCqPqAB4xfRzM2WhB5VUHM_elKIx_j7Qk8",
  authDomain: "vagon-nazorat.firebaseapp.com",
  projectId: "vagon-nazorat",
  storageBucket: "vagon-nazorat.firebasestorage.app",
  messagingSenderId: "165935526785",
  appId: "1:165935526785:web:d81c40e438ac6f5a5aee80",
  measurementId: "G-CX751XWKVB",
  databaseURL: "https://vagon-nazorat-default-rtdb.firebaseio.com"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function toggleAuth() {
        document.getElementById('reg-box').classList.toggle('hidden');
        document.getElementById('login-box').classList.toggle('hidden');
    }

    function signUp() {
        const fio = document.getElementById('reg-fio').value.trim();
        const login = document.getElementById('reg-login').value.trim().toLowerCase();
        const pass = document.getElementById('reg-pass').value.trim();
        if(!fio || !login || !pass) return alert("Barcha maydonlarni to'ldiring!");

        db.ref('users/' + login).once('value', s => {
            if(s.exists()) { alert("Bu login band!"); } 
            else {
                // Yangi kiritilgan hamma sukut bo'yicha "Ishchi" bo'ladi!
                db.ref('users/' + login).set({ fio, pass, role: 'Ishchi' }).then(() => {
                    alert("Muvaffaqiyatli ro'yxatdan o'tdingiz! Kirishingiz mumkin.");
                    toggleAuth();
                });
            }
        });
    }

    function signIn() {
        const login = document.getElementById('login-user').value.trim().toLowerCase();
        const pass = document.getElementById('login-pass').value.trim();
        if(!login || !pass) return alert("Login va parolni yozing!");

        db.ref('users/' + login).once('value', s => {
            const userData = s.val();
            if(userData && userData.pass === pass) {
                localStorage.setItem('vagon_login', login);
                showMain(userData.fio, userData.role);
            } else { alert("Login yoki parol noto'g'ri!"); }
        });
    }

    function showMain(fio, role) {
        document.getElementById('reg-box').classList.add('hidden');
        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('user-header').innerText = `👤 ${fio} (${role})`;
        if(role === 'Admin') {
            document.getElementById('admin-section').classList.remove('hidden');
            loadAllReports();
        }
    }

    const savedLogin = localStorage.getItem('vagon_login');
    if(savedLogin) {
        db.ref('users/' + savedLogin).once('value', s => {
            const u = s.val();
            if(u) showMain(u.fio, u.role);
        });
    }

    function submitReport() {
        const login = localStorage.getItem('vagon_login');
        const vagon = document.getElementById('vagon-num').value.trim();
        const desc = document.getElementById('issue-desc').value.trim();
        const time = new Date().toLocaleString('uz-UZ');
        if(!vagon || !desc) return alert("Ma'lumotni to'ldiring!");

        db.ref('users/' + login).once('value', s => {
            db.ref('reports').push({ fio: s.val().fio, vagon, issue: desc, date: time }).then(() => {
                alert("Nosozlik saqlandi!");
                document.getElementById('vagon-num').value = "";
                document.getElementById('issue-desc').value = "";
            });
        });
    }

    function loadAllReports() {
        db.ref('reports').on('value', s => {
            const list = document.getElementById('reports-list');
            list.innerHTML = "";
            const data = s.val();
            if(data) {
                Object.values(data).reverse().forEach(r => {
                    list.innerHTML += `
                        <div class="record-card">
                            <small style="color: #64748b;">📅 ${r.date}</small><br>
                            <b style="color: var(--primary);">Vagon: ${r.vagon}</b><br>
                            <span style="font-size: 14px;">👤 Aniqladi: ${r.fio}</span><br>
                            <p style="margin: 8px 0 0 0; font-size: 15px;">⚠️ ${r.issue}</p>
                        </div>`;
                });
            }
        });
    }
    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
