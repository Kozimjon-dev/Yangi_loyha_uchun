<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vagon Nazorat - Oson Tizim</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --p: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 10px; margin: 0; }
        .container { max-width: 400px; background: white; padding: 25px; border-radius: 12px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--p); }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--p); color: white; border: none; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        .record-card { background: #fff; border: 1px solid #eee; padding: 10px; margin-bottom: 10px; border-left: 5px solid var(--p); border-radius: 4px; }
    </style>
</head>
<body>

<div class="container" id="login-box">
    <h2>Tizimga kirish</h2>
    <input type="text" id="user-fio" placeholder="To'liq Ism-sharifingiz (F.I.O)">
    <select id="user-role">
        <option value="Ishchi">Ishchi</option>
        <option value="Admin">Glavniy Admin</option>
    </select>
    <button onclick="enterApp()">Kirish</button>
</div>

<div class="container hidden" id="main-app">
    <div id="user-header" style="font-size: 14px; font-weight: bold; margin-bottom: 15px;"></div>
    
    <label>Vagon raqami:</label>
    <input type="text" id="vagon-num" placeholder="Masalan: 1234...">
    
    <textarea id="issue-desc" placeholder="Nosozlikni batafsil yozing..." rows="4"></textarea>
    <button onclick="submitReport()">Hisobotni yuborish</button>
    <button onclick="logout()" style="background: #64748b; margin-top: 10px;">Chiqish</button>

    <div id="admin-section" class="hidden">
        <hr>
        <h3>Barcha Nosozliklar (Admin uchun)</h3>
        <div id="reports-list"></div>
    </div>
</div>

<script>
// Firebase konfiguratsiyasi
const firebaseConfig = {
  apiKey: "AIzaSyCqPqAB4xfRzM2WhB5VUHM_elKIx_j7Qk8",
  authDomain: "vagon-nazorat.firebaseapp.com",
  projectId: "vagon-nazorat",
  storageBucket: "vagon-nazorat.firebasestorage.app",
  messagingSenderId: "165935526785",
  appId: "1:165935526785:web:d81c40e438ac6f5a5aee80",
  measurementId: "G-CX751XWKVB",
  databaseURL: "https://vagon-nazorat-default-rtdb.firebaseio.com/" // Siz topgan manzil!
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Tizimga kirish funksiyasi
    function enterApp() {
        const fio = document.getElementById('user-fio').value;
        const role = document.getElementById('user-role').value;

        if(!fio) return alert("Iltimos, ismingizni yozing!");

        // Brauzer xotirasiga saqlab qo'yamiz (har safar so'ramasligi uchun)
        localStorage.setItem('vagon_user', fio);
        localStorage.setItem('vagon_role', role);

        showMain(fio, role);
    }

    // Sahifani ko'rsatish
    function showMain(fio, role) {
        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('user-header').innerText = `👤 Foydalanuvchi: ${fio} (${role})`;

        if(role === 'Admin') {
            document.getElementById('admin-section').classList.remove('hidden');
            loadAllReports();
        }
    }

    // Avtomatik kirishni tekshirish
    const savedFio = localStorage.getItem('vagon_user');
    const savedRole = localStorage.getItem('vagon_role');
    if(savedFio && savedRole) {
        showMain(savedFio, savedRole);
    }

    // NOSOZLIKNI YUBORISH
    function submitReport() {
        const fio = localStorage.getItem('vagon_user');
        const vagon = document.getElementById('vagon-num').value;
        const desc = document.getElementById('issue-desc').value;
        const time = new Date().toLocaleString('uz-UZ');

        if(!vagon || !desc) return alert("Ma'lumotni to'ldiring!");

        db.ref('reports').push({
            fio: fio,
            vagon: vagon,
            issue: desc,
            date: time
        }).then(() => {
            alert("Nosozlik saqlandi!");
            document.getElementById('vagon-num').value = "";
            document.getElementById('issue-desc').value = "";
        });
    }

    // ADMIN UCHUN BARCHA MA'LUMOTLARNI YUKLASH
    function loadAllReports() {
        db.ref('reports').on('value', s => {
            const list = document.getElementById('reports-list');
            list.innerHTML = "";
            const data = s.val();
            if(data) {
                Object.values(data).reverse().forEach(r => {
                    list.innerHTML += `
                        <div class="record-card">
                            <small>${r.date}</small><br>
                            <b>Vagon: ${r.vagon}</b><br>
                            <span>Aniqladi: ${r.fio}</span><br>
                            <p>⚠️ ${r.issue}</p>
                        </div>`;
                });
            }
        });
    }

    // Chiqish
    function logout() {
        localStorage.clear();
        location.reload();
    }
</script>

</body>
</html>
